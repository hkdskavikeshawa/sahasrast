<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="payment.css">
    <title>Payment</title>
</head>
<body>
    <div class="container">
        <form action="">
            <div class="row">
                <div class="cloumn">
                    <h3 class="title">Billing Address</h3>
                    <div class="input-box">
                        <span>Full Name :</span>
                        <input type="text" placeholder="Samidu Samarasinghe">
                    </div>
                    <div class="input-box">
                        <span>Email :</span>
                        <input type="email" placeholder="example@example.com">
                    </div>
                    <div class="input-box">
                        <span> Address :</span>
                        <input type="text" placeholder="Room - Street - Locality">
                    </div>
                    <div class="input-box">
                        <span> City :</span>
                        <input type="text" placeholder="Colombo">
                    </div>
                    <div class="flex">
                        <div class="input-box">
                            <span> Province :</span>
                            <input type="text" placeholder="Western">
                        </div>
                        <div class="input-box">
                            <span> Zip Code :</span>
                            <input type="number" placeholder="123 456">
                        </div>
                    </div>
                </div>
                <div class="cloumn">
                    <h3 class="title">Payment</h3>
                    <div class="input-box">
                        <span>Cards Accepted :</span>
                        <select>
                            <option value=COD">COD</option>
                            <option value="card">Card</option>
                        </select><br>
                    <div class="input-box"><br>
                        <span>Name On Card :</span>
                        <input type="text" placeholder="Mr. Samidu Samarasinghe">
                    </div>
                    <div class="input-box">
                        <span> Credit Card Number :</span>
                        <input type="text" placeholder="1111 2222 3333 4444">
                    </div>
                    <div class="input-box">
                        <span> Exp. Month :</span>
                        <input type="text" placeholder="August">
                    </div>
                    <div class="flex">
                        <div class="input-box">
                            <span> Exp. Year :</span>
                            <input type="text" placeholder="2025">
                        </div>
                        <div class="input-box">
                            <span> CVV :</span>
                            <input type="number" placeholder="123">
                        </div>
                    </div>
                </div>
            </div>
            </div>
            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
</body>
</html>
